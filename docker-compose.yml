services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: es-lab
    environment:
      - discovery.type=single-node       # un seul nœud, pas de cluster à former
      - xpack.security.enabled=false     # sécurité désactivée pour le labo local
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # mémoire allouée à la JVM d'Elasticsearch
    ports:
      - "9200:9200"                      # API REST accessible sur localhost:9200
    volumes:
      - es-data:/usr/share/elasticsearch/data   # les données survivent aux redémarrages du conteneur

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana-lab
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

volumes:
  es-data:
